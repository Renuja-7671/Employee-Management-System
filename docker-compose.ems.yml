version: '3.8'

# Production EMS — single app container, external DB via .env (Supabase/Postgres).
#
# Deploy:  bash scripts/docker/deploy.sh
# Logs:    docker compose -f docker-compose.ems.yml logs -f app
# Stop:    docker compose -f docker-compose.ems.yml down

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SETUP_PASSWORD: ${NEXT_PUBLIC_SETUP_PASSWORD:-UIS_ADMIN_2025}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Employee Management System}
        NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID:-}
    image: ems-app:latest
    container_name: ems-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
