# Nginx reverse proxy for EMS (Next.js on localhost:3000)
#
# Install on VPS:
#   sudo cp scripts/nginx/ems.conf /etc/nginx/sites-available/ems
#   sudo ln -sf /etc/nginx/sites-available/ems /etc/nginx/sites-enabled/ems
#   sudo rm -f /etc/nginx/sites-enabled/default   # optional
#   sudo nginx -t && sudo systemctl reload nginx
#
# When dxxs3.com DNS works, enable HTTPS block and run certbot.

# HTTP — proxy to EMS
server {
    listen 80;
    listen [::]:80;
    server_name 72.60.210.93 dxxs3.com www.dxxs3.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

