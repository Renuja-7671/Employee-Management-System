# EMS only — does NOT use port 80/443 (quotation system keeps those).
# EMS public URL: http://72.60.210.93:8080
# PM2 app still runs on 127.0.0.1:3000
#
# Install (does not remove or edit other nginx sites):
#   sudo cp scripts/nginx/ems-coexist.conf /etc/nginx/sites-available/ems
#   sudo ln -sf /etc/nginx/sites-available/ems /etc/nginx/sites-enabled/ems
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name 72.60.210.93;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
